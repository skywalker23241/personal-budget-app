<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="个人预算记账助手">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12151d"/>
      <stop offset="1" stop-color="#050608"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#c08a35"/>
      <stop offset="1" stop-color="#f2c983"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="63" height="63" rx="15.5" fill="none" stroke="#E8B45F" stroke-opacity="0.28"/>

  <!-- 星点 -->
  <circle cx="13" cy="15" r="1.3" fill="#E8EAF0" fill-opacity="0.75"/>
  <circle cx="24" cy="9" r="0.9" fill="#E8EAF0" fill-opacity="0.5"/>
  <circle cx="55" cy="26" r="1" fill="#E8EAF0" fill-opacity="0.55"/>

  <!-- 上升的账目柱 -->
  <rect x="13" y="35" width="10" height="15" rx="3" fill="url(#gold)" fill-opacity="0.75"/>
  <rect x="27" y="27" width="10" height="23" rx="3" fill="url(#gold)" fill-opacity="0.88"/>
  <rect x="41" y="19" width="10" height="31" rx="3" fill="url(#gold)"/>

  <!-- 绿色星芒 -->
  <path d="M46 5.5 L47.7 10.3 L52.5 12 L47.7 13.7 L46 18.5 L44.3 13.7 L39.5 12 L44.3 10.3 Z" fill="#5FD08A"/>
